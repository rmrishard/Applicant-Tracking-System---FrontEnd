name: Deploy Frontend to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout frontend code
      uses: actions/checkout@v4

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ubuntu
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          echo "=== Starting Frontend Deployment ==="

          echo "=== Pulling latest frontend code ==="
          cd ~/Applicant-Tracking-System---FrontEnd
          git pull origin main

          echo "=== Copying frontend to backend for building ==="
          cd ~/Applicant-Tracking-System---Backend/ATS\ SpringBoot/demo
          rm -rf frontend
          cp -r ~/Applicant-Tracking-System---FrontEnd/nope-app frontend/

          echo "=== Stopping frontend container ==="
          docker-compose -f docker-compose.prod.yml stop frontend
          docker-compose -f docker-compose.prod.yml rm -f frontend

          echo "=== Building frontend fresh ==="
          docker-compose -f docker-compose.prod.yml build --no-cache frontend

          echo "=== Starting frontend ==="
          docker-compose -f docker-compose.prod.yml up -d frontend

          echo "=== Cleaning up ==="
          docker system prune -af

          echo "=== Frontend Deployment Complete ==="
